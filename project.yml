name: Heirloom
options:
  bundleIdPrefix: com.heirloomcrypto
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "26.3"

packages:
  BitcoinDevKit:
    url: https://github.com/bitcoindevkit/bdk-swift
    exactVersion: 3.0.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: true
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"

targets:
  Heirloom:
    type: application
    platform: iOS
    sources:
      - Heirloom
    dependencies:
      - package: BitcoinDevKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heirloomcrypto.heirloom
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Heirloom uses Face ID to protect access to your wallet keys."
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        # Mainnet is deliberately NOT compiled in. To even expose the option you
        # must add MAINNET_ENABLED to SWIFT_ACTIVE_COMPILATION_CONDITIONS.
        # NOT AUDITED — DO NOT USE WITH REAL FUNDS.
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"

  HeirloomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HeirloomTests
    dependencies:
      - target: Heirloom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heirloomcrypto.heirloom-tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Heirloom:
    build:
      targets:
        Heirloom: all
        HeirloomTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - HeirloomTests
